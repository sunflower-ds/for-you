<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For You ♡</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="stars" id="stars"></div>

  <h1>For You ♡</h1>
  <p class="subtitle">a little something, every day</p>

  <div class="countdown-box">
    <div class="countdown-label">next message unlocks in</div>
    <div class="countdown-timer" id="countdown-timer">--:--:--</div>
  </div>

  <div class="day-grid" id="day-grid"></div>

  <div class="card" id="card">
    <div class="day-label" id="day-label"></div>
    <div class="topic"     id="topic"></div>
    <div                   id="badges"></div>

    <!-- 1. Photo -->
    <div class="photo-wrap" id="photo-wrap">
      <img id="photo-img" src="" alt="" />
      <div class="photo-caption" id="photo-caption"></div>
    </div>

    <!-- 2. Audio (moved above message) -->
    <div class="audio-wrap" id="audio-wrap">
      <div class="audio-label">&#127908; hear my voice</div>
      <audio id="audio-el" preload="none"></audio>
      <div class="audio-controls">
        <button class="play-btn" id="play-btn" aria-label="Play">&#9654;</button>
        <div class="progress-wrap" id="progress-wrap">
          <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div class="time-display" id="time-display">0:00</div>
      </div>
    </div>

    <!-- 3. Message text -->
    <div class="message-body" id="message-body"></div>

    <!-- 4. Poem -->
    <div class="poem-wrap" id="poem-wrap">
      <div class="poem-title" id="poem-title">a poem for you</div>
      <div class="poem-body"  id="poem-body"></div>
    </div>

    <!-- 5. Questions -->
    <div class="questions-wrap" id="questions-wrap">
      <div class="questions-divider"></div>
      <div class="questions-header">things to think about</div>
      <div class="questions-list" id="questions-list"></div>
      <button class="reveal-btn" id="reveal-btn" aria-label="Reveal next question">
        <span id="reveal-btn-text">&#10022; reveal a question</span>
      </button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
